global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cs2-analytics
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI backend exposes /metrics (Prometheus client format).
  - job_name: cs2-backend
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [cs2-analytics]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: backend
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  - job_name: cs2-frontend
    metrics_path: /api/metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [cs2-analytics]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: frontend

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter.cs2-analytics.svc:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter.cs2-analytics.svc:9121"]

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.kube-system.svc:8080"]

  - job_name: node-exporter
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):(.+)"
        replacement: "$1:9100"
        target_label: __address__
