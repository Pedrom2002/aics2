global:
  resolve_timeout: 5m
  slack_api_url: https://hooks.slack.com/services/REPLACE/ME/PLEASE

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty
      continue: true
    - matchers:
        - severity="warning"
      receiver: slack-warnings

receivers:
  - name: default
    slack_configs:
      - channel: "#cs2-alerts"
        send_resolved: true

  - name: slack-warnings
    slack_configs:
      - channel: "#cs2-alerts"
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'

  - name: pagerduty
    pagerduty_configs:
      - service_key: REPLACE_ME
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, namespace]
