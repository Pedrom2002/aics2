apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cs2-analytics
  labels:
    app: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cs2-analytics
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/cs2-analytics/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cs2-analytics-config
            - secretRef:
                name: cs2-analytics-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: models
              mountPath: /var/lib/cs2/models
            - name: parse-cache
              mountPath: /var/lib/cs2/parse-cache
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: parse-cache
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: cs2-analytics
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
