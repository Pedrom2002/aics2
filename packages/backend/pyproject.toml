[project]
name = "cs2-backend"
version = "0.1.0"
description = "AI CS2 Analytics — Backend API"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.135.3",
    "uvicorn[standard]>=0.44.0",
    "pydantic[email]>=2.13.0",
    "pydantic-settings>=2.13.1",
    "sqlalchemy[asyncio]>=2.0.49",
    "asyncpg>=0.31.0",
    "alembic>=1.18.4",
    "python-jose[cryptography]>=3.5.0",
    "argon2-cffi>=25.1.0",
    "celery[redis]>=5.6.3",
    "redis>=7.4.0",
    "slowapi>=0.1.9",
    "python-multipart>=0.0.26",
    "httpx>=0.28.1",
    "numpy>=2.4.4",
    "prometheus-client>=0.25.0",
    "stripe>=15.0.1",
    "sentry-sdk[fastapi]>=2.58.0",
]

[project.optional-dependencies]
parser = [
    "awpy>=2.0.2",
    "pandas>=3.0.2",
]
test = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "aiosqlite>=0.22.1",
    "polars>=1.39.3",
    "fakeredis>=2.35.1",
]
dev = [
    "ruff>=0.15.10",
    "mypy>=1.20.1",
    "pre-commit>=4.5.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
